# 数据配置
数据配置:
  version: "2.0.0"
  last_updated: "2025-04-01"
  sources:
    985名单: "教育部公开文件（2006年确定，已停止新增）"
    211名单: "教育部公开文件（2011年确定，已停止新增）"
    双一流名单: "教育部2022年第二轮双一流建设高校名单"
    学科评估: "教育部第四轮学科评估（2017年公布）"
    高校信息: "阳光高考平台/各校官网"
    就业数据: "各校2023年就业质量报告"
    科研数据: "各校年度报告/公开统计"
  notes:
    - "985/211工程已于2017年统一纳入双一流建设，不再单独评审"
    - "第五轮学科评估结果（2023年）未公开完整排名，暂使用第四轮数据"
    - "就业/科研数据为近似值，具体以各校官方发布为准"
  cache:
    启用: true
    路径: "./cache"
    有效期天数: 30
    自动刷新: true
  search:
    默认返回数量: 10
    最大返回数量: 50
    模糊匹配: true
    优先级排序:
      - 985
      - 211
      - 双一流
      - 软科排名