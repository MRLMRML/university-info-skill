name: Annual Data Update
on:
  schedule:
    - cron: '0 0 1 4 *'
    - cron: '0 0 1 9 *'
  workflow_dispatch:
jobs:
  update-rankings:
    runs-on: ubuntu-latest
    name: Update Rankings Data
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      - name: Crawl latest rankings
        run: python scripts/crawl_rankings.py
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'data: 自动更新排名数据'
          title: '[Auto] 年度数据更新 - 排名'
          body: |
            ## 自动数据更新
            由 GitHub Actions 自动触发，请人工审核后合并。
            ### 更新内容
            - rankings.csv: 软科最新年度排名
            ### 审核要点
            - [ ] 数据行数与往年一致（±10%）
            - [ ] TOP10 排名无异常跳变
            - [ ] 无缺失字段
          branch: auto/update-rankings
          labels: data-update, auto
  validate-existing:
    runs-on: ubuntu-latest
    name: Validate Data Integrity
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run validation
        run: python scripts/validate_data.py
      - name: Report results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Alert] 数据完整性校验失败',
              body: '自动校验发现数据问题，请检查 Actions 日志。',
              labels: ['bug', 'data-integrity']
            })
